---
name: get_analysis_files
runner_type: python-script
description: Get files from an analysis in Cleve
entry_point: cleve_request.py
enabled: true
parameters:
  api_key:
    description: Cleve API key
    type: string
    secret: true
    required: false
  analysis_id:
    description: ID of the analysis to fetch files from
    type: string
    required: true
  parent_id:
    description: >
      The ID of the parent of the analysis. If the analysis level is
      "run", then the parent_id would be the run ID, sample ID if the
      level is "sample", and case ID if the level is "case".
    type: string
    required: false
  type:
    description: The requested file type
    type: string
    enum:
      - bam
      - vcf
      - vcf_snv
      - vcf_sv
      - fastq
      - text
      - interop
    required: false
  level:
    description: >
      Analysis level to filter on
    type: string
    enum:
      - run
      - case
      - sample
  name:
    description: >
      The exact name of the analysis file that should be fetched
    type: string
    required: false
  method:
    description: HTTP method
    type: string
    immutable: true
    required: true
    default: GET
  endpoint:
    description: Cleve API endpoint
    type: string
    immutable: true
    required: true
    default: "analyses/{{ analysis_id }}/files"
  params:
    description: Request parameters
    type: object
    immutable: true
    required: true
    default:
      parent_id: "{% if parent_id is not none %}{{ parent_id | urlencode }}{% endif %}"
      type: "{% if type is not none %}{{ type | urlencode }}{% endif %}"
      level: "{% if level is not none %}{{ level | urlencode }}{% endif %}"
      name: "{% if name is not none %}{{ name | urlencode }}{% endif %}"
