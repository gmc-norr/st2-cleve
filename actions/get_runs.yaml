---
name: get_runs
runner_type: http-request
description: Get sequencing runs from Cleve
entry_point: ""
enabled: true
parameters:
  run_id:
    description: ID of the run to fetch.
    type: string
    required: false
  state:
    description: Filter on the most recent run state
    type: string
    enum:
      - ready
      - error
      - incomplete
      - moved
      - moving
      - pending
    required: false
  platform:
    description: Filter on sequencing platform
    type: string
    required: false
  page:
    description: Page of results to get
    type: integer
    minimum: 1
    default: 1
    required: true
  page_size:
    description: Max number of results per page
    type: integer
    minimum: 1
    default: 10
    required: true
  url:
    description: Request URL
    type: string
    default: "{{ config_context.base_url }}/api/runs?page={{ page }}&page_size={{ page_size }}{% if run_id is not none %}&run_id={{ run_id | urlencode }}{% endif %}{% if state is not none %}&state={{ state | urlencode }}{% endif %}{% if platform is not none %}&platform={{ platform | urlencode }}{% endif %}"
    immutable: true
    required: true
  method:
    description: HTTP method
    type: string
    default: GET
    immutable: true
    required: true
  headers:
    description: Request headers
    type: object
    default:
      Accept: application/json
    immutable: true
    required: true
