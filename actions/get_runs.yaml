---
name: get_runs
runner_type: python-script
description: Get sequencing runs from Cleve
entry_point: "cleve_request.py"
enabled: true
parameters:
  api_key:
    description: Cleve API key
    type: string
    required: false
  run_id:
    description: ID of the run to fetch.
    type: string
    required: false
  state:
    description: Filter on the most recent run state
    type: string
    enum:
      - ready
      - error
      - incomplete
      - moved
      - moving
      - pending
    required: false
  platform:
    description: Filter on sequencing platform
    type: string
    required: false
  page:
    description: Page of results to get
    type: integer
    minimum: 1
    default: 1
    required: true
  page_size:
    description: Max number of results per page
    type: integer
    minimum: 1
    default: 10
    required: true
  endpoint:
    description: Cleve API endpoint
    type: string
    default: runs
    immutable: true
    required: true
  params:
    description: Request parameters
    type: object
    default:
      page: "{{ page }}"
      page_size: "{{ page_size }}"
      run_id: "{% if run_id is not none %}{{ run_id | urlencode }}{% endif %}"
      state: "{% if state is not none %}{{ state | urlencode }}{% endif %}"
      platform: "{% if platform is not none %}{{ platform | urlencode }}{% endif %}"
    immutable: true
    required: true
  method:
    description: HTTP method
    type: string
    default: GET
    immutable: true
    required: true
