---
name: add_run
runner_type: python-script
description: Add a new sequencing run
entry_point: "cleve_request.py"
enabled: true
parameters:
  url:
    description: Add run endpoint URL
    type: string
    default: "{{ config_context.base_url }}/api/runs"
    immutable: true
    required: true
  method:
    description: HTTP method
    type: string
    default: POST
    immutable: true
    required: true
  data:
    description: Request data
    type: object
    required: true
  api_key:
    description: Cleve API key
    type: string
    secret: true
    required: false

output_schema:
  type: object
  properties:
    error:
      type: string
      required: false
      default: null
    status_code:
      type: integer
      required: true
    body:
      anyOf:
        - type: string
        - type: object
      required: true
