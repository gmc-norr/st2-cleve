---
name: update_run
runner_type: http-request
description: Update a sequencing run
entry_point: ""
enabled: true
parameters:
  api_key:
    description: Cleve API key
    type: string
    secret: true
    required: false
  run_id:
    description: ID of the run to update
    type: string
    required: true
  state:
    description: New state of the run
    type: string
    enum:
      - ready
      - error
      - incomplete
      - moved
      - moving
      - pending
    required: false
  path:
    description: New path of the run
    type: string
    required: false
  body:
    description: Request body
    type: object
    immutable: true
    required: true
    default:
      path: "{% if path is not none %}{{ path }}{% endif %}"
      state: "{% if state is not none %}{{ state }}{% endif %}"
  url:
    description: Add run endpoint URL
    type: string
    default: "{{ config_context.base_url }}/api/runs/{{ run_id }}"
    immutable: true
    required: true
  method:
    description: HTTP method
    type: string
    default: PATCH
    immutable: true
    required: true
  headers:
    type: object
    immutable: true
    required: true
    default:
      Authorization: "{{ api_key }}"
      Content-Type: application/json
