---
name: get_analyses
runner_type: python-script
description: Get sequencing analyses from Cleve
entry_point: "cleve_request.py"
enabled: true
parameters:
  api_key:
    description: Cleve API key
    type: string
    secret: true
    required: false
  analysis_id:
    description: ID of the analysis to fetch.
    type: string
    required: false
  run_id:
    description: Filter on analyses associated with a specific run ID
    type: string
    required: false
  state:
    description: Filter on the most recent state
    type: string
    enum:
      - ready
      - error
      - incomplete
      - moved
      - moving
      - pending
    required: false
  software:
    description: Filter on software
    type: string
    required: false
  software_pattern:
    description: Filter on software pattern
    type: string
    required: false
  page:
    description: Page of results to get
    type: integer
    minimum: 1
    default: 1
    required: true
  page_size:
    description: Max number of results per page
    type: integer
    minimum: 1
    default: 10
    required: true
  endpoint:
    description: Cleve API endpoint
    type: string
    default: analyses
    immutable: true
    required: true
  params:
    description: Request parameters
    type: object
    default:
      page: "{{ page }}"
      page_size: "{{ page_size }}"
      analysis_id: "{% if analysis_id is not none %}{{ analysis_id }}{% endif %}"
      run_id: "{% if run_id is not none %}{{ run_id }}{% endif %}"
      state: "{% if state is not none %}{{ state }}{% endif %}"
      software: "{% if software is not none %}{{ software }}{% endif %}"
      software_pattern: "{% if software_pattern is not none %}{{ software_pattern }}{% endif %}"
    immutable: true
    required: true
  method:
    description: HTTP method
    type: string
    default: GET
    immutable: true
    required: true
