---
name: get_platforms
runner_type: python-script
description: Get information on the sequencing platforms from Cleve
entry_point: "cleve_request.py"
enabled: true
parameters:
  api_key:
    description: Cleve API key
    type: string
    secret: true
    required: false
  platform:
    description: Name of the platform to fetch.
    type: string
    required: false
  endpoint:
    description: Cleve API endpoint
    type: string
    default: platforms{% if platform is not none %}/{{ platform | urlencode }}{% endif %}
    immutable: true
    required: true
  method:
    description: HTTP method
    type: string
    default: GET
    immutable: true
    required: true
